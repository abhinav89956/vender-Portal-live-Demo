<div class="dashboard-wrapper">

  <div class="dashboard-card">

    <!-- Header Section -->
    <div class="dashboard-header">
      <div class="avatar-circle">
        {{ vendorForm.get('venderCode')?.value?.charAt(0) || 'V' }}
      </div>
      <div>
        <h2>Vendor Dashboard</h2>
        <p class="subtitle">Logged-in Vendor Details</p>
      </div>
    </div>

    <form [formGroup]="vendorForm">

      <div class="form-grid">

        <div class="form-group">
          <label>Vendor Code</label>
          <input type="text" formControlName="venderCode">
        </div>

        <div class="form-group">
          <label>Email Address</label>
          <input type="text" formControlName="email">
        </div>

        <div class="form-group">
          <label>Lot Vendor</label>
          <input type="text" formControlName="lotVender">
        </div>

        <div class="form-group">
          <label>Description</label>
          <input type="text" formControlName="codeDescription">
        </div>

        <div class="form-group full-width">
          <label>Inserted Date</label>
          <input type="text" formControlName="insertedDate">
        </div>

      </div>

    </form>

  </div>

</div>
