<div class="settings-container">
  <div class="card shadow-sm p-4">

    <h3 class="text-center mb-4">Update System Settings</h3>

    <form [formGroup]="settingsForm">

      <!-- ✅ Hidden ID Field (IMPORTANT) -->
      <input type="hidden" formControlName="id" />

      <!-- Min Expiration Months -->
      <div class="mb-3">
        <label class="form-label">
          Min Expiration Months <span class="text-danger">*</span>
        </label>
        <input
          type="number"
          class="form-control"
          formControlName="minExpirationMonths"
        />
        <small class="text-danger" *ngIf="f['minExpirationMonths'].touched && f['minExpirationMonths'].invalid">
          Min Expiration Months is required
        </small>
      </div>

      <!-- Manufacturing Days -->
      <div class="mb-3">
        <label class="form-label">
          Manufacturing Days <span class="text-danger">*</span>
        </label>
        <input
          type="number"
          class="form-control"
          formControlName="manufacturingDays"
        />
        <small class="text-danger" *ngIf="f['manufacturingDays'].touched && f['manufacturingDays'].invalid">
          Manufacturing Days is required
        </small>
      </div>

     

      <!-- Update Button -->
      <div class="text-center">
        <button
          type="button"
          class="btn btn-primary px-4"
          (click)="updateSettings()"
          [disabled]="isSaving"
        >
          {{ isSaving ? 'Updating...' : 'Update' }}
        </button>
      </div>

    </form>
  </div>
</div>
