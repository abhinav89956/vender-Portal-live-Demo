<div class="reset-container">
  <div class="form-wrapper">
    <div class="form-card">

      <!-- Modern Loader -->
      <div *ngIf="loading && !otpVerified" class="loader-overlay">
        <div class="loader-dots">
          <span></span>
          <span></span>
          <span></span>
        </div>
      </div>

      <h2>Forgot Password</h2>
      <form [formGroup]="resetForm">

        <!-- Vendor Code -->
        <div class="input-group">
          <i class="fa fa-user"></i>
          <input type="text" placeholder="Vendor Code" formControlName="venderCode" />
        </div>
        <small *ngIf="submitted && f['venderCode'].errors">Vendor Code is required</small>

        <!-- Email -->
        <div class="input-group">
          <i class="fa fa-envelope"></i>
          <input type="email" placeholder="Email" formControlName="email" />
        </div>
        <small *ngIf="submitted && f['email'].errors">Valid Email is required</small>

        <!-- Password -->
        <div class="input-group">
          <i class="fa fa-key"></i>
          <input type="password" placeholder="Enter New Password" formControlName="password" />
        </div>
        <small *ngIf="submitted && f['password'].errors">Password is required</small>

        <!-- Confirm Password -->
        <div class="input-group">
          <i class="fa fa-key"></i>
          <input type="password" placeholder="Re-Enter Password" formControlName="confirmPassword" />
        </div>
        <small *ngIf="submitted && f['confirmPassword'].errors">Confirm Password is required</small>
        <small *ngIf="submitted && resetForm.errors?.['passwordMismatch']">Passwords do not match</small>

        <!-- Send OTP Button -->
        <button type="button" (click)="sendOtp()">Reset Password</button>

        <!-- OTP Section -->
        <div *ngIf="otpSent" class="otp-section">
          <div class="input-group">
            <i class="fa fa-shield"></i>
            <input type="text" placeholder="Enter OTP" formControlName="otp" />
          </div>
          <button type="button" (click)="verifyOtp()">Verify OTP</button>
        </div>

        <!-- Password Reset Section -->
        <div *ngIf="otpVerified" class="success-box">
          ✅ OTP Verified Successfully
          <button type="button" (click)="resetPassword()">Confirm Reset Password</button>
        </div>

        <!-- Links -->
        <div class="links">
          <p>Already have an account? <a routerLink="/login">Login</a></p>
          <p>Don't have an account? <a routerLink="/signup">Signup</a></p>
        </div>

      </form>
    </div>
  </div>
</div>
