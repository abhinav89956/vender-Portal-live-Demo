<div class="signup-container">
  <div class="signup-form">
    <h2>Signup</h2>

    <form [formGroup]="signUpForm" (ngSubmit)="onSubmit()">

      <div class="form-group">
        <input type="text" formControlName="venderCode" placeholder="Vendor Code" />
        <div class="error" *ngIf="submitted && f['venderCode'].errors">
          Vendor Code is required
        </div>
      </div>

      <div class="form-group">
        <input type="email" formControlName="email" placeholder="Email" />
        <div class="error" *ngIf="submitted && f['email'].errors">
          <span *ngIf="f['email'].errors['required']">Email is required</span>
          <span *ngIf="f['email'].errors['email']">Invalid email format</span>
        </div>
      </div>

      <div class="form-group">
        <input type="password" formControlName="password" placeholder="New Password" />
        <div class="error" *ngIf="submitted && f['password'].errors">
          <span *ngIf="f['password'].errors['required']">Password is required</span>
          <span *ngIf="f['password'].errors['minlength']">Password must be at least 5 characters</span>
        </div>
      </div>

      <div class="form-group">
        <input type="password" formControlName="confirmPassword" placeholder="Confirm New Password" />
        <div class="error" *ngIf="submitted && f['confirmPassword'].errors || signUpForm.errors?.['mismatch']">
          <span *ngIf="f['confirmPassword'].errors?.['required']">Confirm Password is required</span>
          <span *ngIf="signUpForm.errors?.['mismatch']">Passwords do not match</span>
        </div>
      </div>

      <button type="submit">Register</button>


      <p class="login-link">
        Already have an account? <a routerLink="/login">Login</a>
      </p>

    </form>
  </div>
</div>
